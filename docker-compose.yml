version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: takai
      POSTGRES_DB: ResearchDB
    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  research-app:
    build: .

    ports:
      - "8080:8080"

    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/ResearchDB

      - GEMINI_KEY=${GEMINI_KEY}
    depends_on:
      - postgres-db

volumes:
  postgres-data:
